<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAHAM.IA</title>

<link rel="stylesheet" href="css/style.css">

<!-- LUCIDE ICONS -->
<script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

<div class="layout">

    <aside class="sidebar">
        <h2>GRAHAM</h2>

        <button onclick="location.href='index.html'">
            <i data-lucide="plus"></i>
            Nova conversa
        </button>

        <button onclick="location.href='historico.html'">
            <i data-lucide="history"></i>
            Histórico
        </button>

        <button onclick="location.href='fechamento.html'">
            <i data-lucide="wallet"></i>
            Fechamento
        </button>

        <button onclick="location.href='patrimonio.html'">
            <i data-lucide="briefcase"></i>
            Patrimônio
        </button>
    </aside>

    <main class="main">
            <a href="login.html" class="btn-login">
            <i data-lucide="log-in"></i>
            Login
            </a>

        <div class="chat-header">
            <h2>Assistente Financeira IA</h2>
            <p>Pergunte sobre finanças, investimentos e mercado</p>
        </div>

        <div id="chat-box" class="chat-box">
            <div class="msg bot">
                Olá! Sou sua assistente financeira com IA. Como posso te ajudar hoje?
            </div>
        </div>

        <div class="input-area">
            <textarea id="input" placeholder="Digite sua pergunta..."></textarea>
            <button onclick="enviar()">
                <i data-lucide="send"></i>
            </button>
        </div>

    </main>

</div>

<script>
function enviar() {
    const input = document.getElementById("input");
    const chatBox = document.getElementById("chat-box");

    if (!input || !chatBox) return;

    const texto = input.value.trim();
    if (texto === "") return;

    const userMsg = document.createElement("div");
    userMsg.classList.add("msg", "user");
    userMsg.textContent = texto;
    chatBox.appendChild(userMsg);

    const botMsg = document.createElement("div");
    botMsg.classList.add("msg", "bot");
    botMsg.textContent = "Pensando...";
    chatBox.appendChild(botMsg);

    setTimeout(() => {
        botMsg.textContent = "Resposta do bot 🙂";
    }, 1000);

    input.value = "";
    chatBox.scrollTop = chatBox.scrollHeight;
}
</script>

<!-- ATIVA OS ÍCONES -->
<script>
lucide.createIcons();
</script>

</body>
</html>
