<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Histórico - GRAHAM.IA</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

<div class="layout">

    <aside class="sidebar">
        <h2>GRAHAM</h2>

        <button onclick="location.href='index.html'">
            <i data-lucide="plus"></i>
            Nova conversa
        </button>

        <button onclick="location.href='historico.html'">
            <i data-lucide="history"></i>
            Histórico
        </button>

        <button onclick="location.href='fechamento.html'">
            <i data-lucide="wallet"></i>
            Fechamento
        </button>

        <button onclick="location.href='patrimonio.html'">
            <i data-lucide="briefcase"></i>
            Patrimônio
        </button>
    </aside>

    <main class="main">

        <div class="historico-container">
            <h1>Histórico de Conversas</h1>

            <div class="historico-item">
                <i data-lucide="message-square"></i>
                <div>
                    <h3>Como começar a investir?</h3>
                    <p>Resumo da conversa sobre investimentos iniciais...</p>
                    <span>06/04/2026</span>
                </div>
            </div>

            <div class="historico-item">
                <i data-lucide="message-square"></i>
                <div>
                    <h3>Diversificação de carteira</h3>
                    <p>Discussão sobre como dividir investimentos...</p>
                    <span>05/04/2026</span>
                </div>
            </div>

            <div class="historico-item">
                <i data-lucide="message-square"></i>
                <div>
                    <h3>Controle de gastos</h3>
                    <p>Dicas para organizar finanças pessoais...</p>
                    <span>04/04/2026</span>
                </div>
            </div>

        </div>

    </main>

</div>

<script>
lucide.createIcons();
</script>

</body>
</html>
