<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fechamento</title>

<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>

</head>

<body>

<div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2>GRAHAM</h2>

        <button onclick="location.href='index.html'">
            <i data-lucide="plus"></i> Nova conversa
        </button>

        <button onclick="location.href='historico.html'">
            <i data-lucide="history"></i> Histórico
        </button>

        <button onclick="location.href='fechamento.html'">
            <i data-lucide="bar-chart"></i> Fechamento
        </button>

        <button onclick="location.href='patrimonio.html'">
            <i data-lucide="briefcase"></i> Patrimônio
        </button>
    </aside>

    <!-- MAIN -->
    <main class="main">

        <div class="container">

            <h2>Fechamento Financeiro</h2>

            <!-- RESUMO -->
            <div class="resumo">
                <div class="card">
                    <p>Total Receita</p>
                    <h3 class="verde">R$ 8.500</h3>
                </div>

                <div class="card">
                    <p>Total Despesas</p>
                    <h3 class="vermelho">R$ 3.200</h3>
                </div>

                <div class="card">
                    <p>Saldo Acumulado</p>
                    <h3 class="verde">R$ 5.300</h3>
                </div>

                <div class="card">
                    <p>Saldo Médio</p>
                    <h3>R$ 1.325</h3>
                </div>
            </div>

            <!-- GRÁFICO -->
            <div class="card grafico">
                <h3>Comparativo Mensal</h3>
                <canvas id="grafico"></canvas>
            </div>

            <!-- MESES -->
            <div class="meses">

                <div class="mes">
                    <strong>Janeiro</strong>
                    <p>Receita: <span class="verde">R$ 5.000</span></p>
                    <p>Despesas: <span class="vermelho">R$ 2.000</span></p>
                </div>

                <div class="mes">
                    <strong>Fevereiro</strong>
                    <p>Receita: <span class="verde">R$ 3.500</span></p>
                    <p>Despesas: <span class="vermelho">R$ 1.200</span></p>
                </div>

            </div>

        </div>

    </main>

</div>

<script>
lucide.createIcons();

new Chart(document.getElementById('grafico'), {
    type: 'bar',
    data: {
        labels: ['Jan', 'Fev', 'Mar', 'Abr'],
        datasets: [
            {
                label: 'Receitas',
                data: [5000, 3500, 4000, 6000]
            },
            {
                label: 'Despesas',
                data: [2000, 1200, 1800, 2500]
            }
        ]
    }
});
</script>

</body>
</html>
