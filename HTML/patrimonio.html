<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patrimônio</title>

<link rel="stylesheet" href="css/style.css">

<!-- gráfico -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- ícones -->
<script src="https://unpkg.com/lucide@latest"></script>

<style>
/* 🔥 SEU ESTILO ORIGINAL (mantido) */
.patrimonio {
    width: 100%;
    max-width: 1000px;
    margin-top: 30px;
}

.topo {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.botoes {
    background: #5b4bff;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    gap: 20px;
}
.btn-topo {
    min-width: 160px;
    justify-content: center;
    display: flex;
    align-items: center;
    gap: 10px;

    padding: 12px;
    background: rgb(123, 62, 173);
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.btn-topo:hover {
    background: rgb(100, 50, 150);
}
.card {
    background: white;
    border-radius: 12px;
    padding: 20px;
    margin-top: 20px;
}

.grid {
    display: flex;
    gap: 20px;
}

.grid .card {
    flex: 1;
}

.verde { color: green; }
.vermelho { color: red; }
.azul { color: #5b4bff; }

canvas {
    max-height: 250px;
}
</style>
</head>

<body>

<div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2>GRAHAM</h2>

        <button onclick="location.href='index.html'">
            <i data-lucide="plus"></i> Nova conversa
        </button>

        <button onclick="location.href='historico.html'">
            <i data-lucide="history"></i> Histórico
        </button>

        <button onclick="location.href='fechamento.html'">
            <i data-lucide="bar-chart"></i> Fechamento
        </button>

        <button onclick="location.href='patrimonio.html'">
            <i data-lucide="briefcase"></i> Patrimônio
        </button>
    </aside>

    <main class="main">

        <div class="patrimonio">

            <div class="topo">
                <div>
                    <h2>Minhas Carteiras</h2>
                    <p>Total em carteiras: <span class="azul">R$ 23.500,00</span></p>
                </div>

                <button class="btn-topo">
                    Gerenciar Carteiras
                </button>
            </div>

            <div class="grid">
                <div class="card">
                    <p>Conta Corrente</p>
                    <h3 class="azul">R$ 8.500,00</h3>
                </div>

                <div class="card">
                    <p>Poupança</p>
                    <h3 class="verde">R$ 15.000,00</h3>
                </div>
            </div>

            <!-- RESUMO -->
            <div class="grid">
                <div class="card">
                    <p>Saldo Total</p>
                    <h2 class="verde">R$ 6.950,00</h2>
                </div>

                <div class="card">
                    <p>Receitas</p>
                    <h2 class="verde">R$ 8.500,00</h2>
                </div>

                <div class="card">
                    <p>Despesas</p>
                    <h2 class="vermelho">R$ 1.550,00</h2>
                </div>
            </div>

            <!-- GRÁFICO -->
            <div class="card">
                <h3>Evolução do Patrimônio</h3>
                <canvas id="grafico"></canvas>
            </div>

            <!-- TRANSAÇÕES -->
            <div class="card">
                <div class="topo">
                    <h3>Transações</h3>
                    <button class="btn-topo">+ Nova Transação</button>
                </div>

                <p>Salário mensal - <span class="verde">+ R$ 5.000,00</span></p>
            </div>

        </div>

    </main>

</div>

<script>
lucide.createIcons();

new Chart(document.getElementById('grafico'), {
    type: 'line',
    data: {
        labels: ['28/02', '04/03', '09/03', '14/03'],
        datasets: [{
            label: 'Patrimônio',
            data: [5000, 3800, 3400, 7000],
            borderWidth: 2,
            fill: false
        }]
    }
});
</script>

</body>
</html>
