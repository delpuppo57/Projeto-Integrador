<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GRAHAM.IA</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <h2>Acessar GRAHAM</h2>
            
            <form>
                <div class="form-group">
                    <label>Login</label>
                    <input type="text" placeholder="Seu usuário ou e-mail">
                </div>

                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" placeholder="Sua senha">
                </div>

                <button type="button" class="btn-entrar">Entrar</button>
            </form>

            <a href="#" class="signup-link">Não tem conta? Cadastre-se</a>
            <br>
            <a href="index.html" style="font-size: 12px; color: #999; text-decoration: none;">← Voltar ao início</a>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
